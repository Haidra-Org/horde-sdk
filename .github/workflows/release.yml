name: horde_sdk build and publish

on:
  push:
    tags:
      - "v*"

jobs:
  build-n-publish:
    name: horde_sdk build and publish
    runs-on: ubuntu-latest

    environment: # see https://github.com/pypa/gh-action-pypi-publish/tree/release/v1/
      name: pypi
      url: https://pypi.org/p/horde-sdk/

    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
      contents: write  # needed to create the GitHub release

    steps:
    - name: "✔️ Checkout"
      uses: actions/checkout@v4
      with:
        # Full history (including tags) is required so setuptools-scm can
        # derive the version from the pushed tag.
        fetch-depth: 0

    - name: "📦 Install uv"
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.13"

    # setuptools-scm reads the version straight from the pushed tag (e.g.
    # v1.2.3 -> 1.2.3), so no pretend-version env var is needed.
    - name: "🔧 Build a binary wheel and a source tarball"
      run: uv build

    - name: "📦 Publish distribution to PyPI"
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: "📣 Create GitHub release"
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
